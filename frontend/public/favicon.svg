<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0e06"/>
      <stop offset="100%" stop-color="#2d1500"/>
    </linearGradient>
    <linearGradient id="fire" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="50%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="wing" x1="8" y1="20" x2="56" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Tail flames -->
  <path d="M 20 44 C 14 50 10 54 13 58" stroke="url(#fire)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 23 46 C 18 51 16 56 20 59" stroke="url(#fire)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 26 47 C 23 52 22 56 25 58" stroke="url(#fire)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Body -->
  <path d="M 20 44 C 24 38 30 30 42 22" stroke="url(#fire)" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Left wing -->
  <path d="M 28 36 C 20 26 12 18 10 10 C 18 14 26 18 34 24" stroke="url(#wing)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right wing -->
  <path d="M 32 32 C 38 22 44 16 50 12 C 46 18 44 24 42 28" stroke="url(#wing)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <!-- Head -->
  <circle cx="44" cy="20" r="4" fill="url(#fire)"/>
  <!-- Beak -->
  <path d="M 47 17 L 54 13" stroke="url(#fire)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Glow dot -->
  <circle cx="31" cy="33" r="2" fill="#fbbf24" opacity="0.5"/>
</svg>
