<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rounded dark background -->
  <rect width="100" height="100" rx="20" fill="#09090b" />

  <!-- White square — behind segment (right side + top-right corner) -->
  <path
    d="M 48,7 Q 58,7 58,17 V 48"
    stroke="#ffffff"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Orange square — full outline -->
  <path
    d="M 55,42 H 83 Q 93,42 93,52 V 83 Q 93,93 83,93 H 55 Q 42,93 42,83 V 55 Q 42,42 55,42 Z"
    stroke="#ff3e00"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Orange internal vertical bar -->
  <line x1="56" y1="54" x2="56" y2="80" stroke="#ff3e00" stroke-width="7" stroke-linecap="round" />

  <!-- Orange internal horizontal bar -->
  <line x1="66" y1="70" x2="82" y2="70" stroke="#ff3e00" stroke-width="7" stroke-linecap="round" />

  <!-- White square — front segment (bottom + left + top) -->
  <path
    d="M 58,48 Q 58,58 48,58 H 17 Q 7,58 7,48 V 17 Q 7,7 17,7 H 48"
    stroke="#ffffff"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- White internal horizontal bar — upper (wider) -->
  <line x1="19" y1="28" x2="46" y2="28" stroke="#ffffff" stroke-width="7" stroke-linecap="round" />

  <!-- White internal horizontal bar — lower (shorter) -->
  <line x1="19" y1="40" x2="38" y2="40" stroke="#ffffff" stroke-width="7" stroke-linecap="round" />
</svg>
