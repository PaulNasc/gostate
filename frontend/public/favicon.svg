<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#122050"/>
    </linearGradient>
    <linearGradient id="icon" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6b8ff8"/>
      <stop offset="100%" stop-color="#3b62f6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Top arc: left to right -->
  <path d="M 14 26 C 14 16 28 11 38 16" stroke="url(#icon)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <!-- Top arrowhead -->
  <polyline points="34,12 39,17 34,22" stroke="url(#icon)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom arc: right to left -->
  <path d="M 50 38 C 50 48 36 53 26 48" stroke="url(#icon)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <!-- Bottom arrowhead -->
  <polyline points="30,52 25,47 30,42" stroke="url(#icon)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
